<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Kirim Pengumuman – BBQ Night</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      :root {
        --black: #0a0a0a;
        --white: #f5f5f0;
        --gray-light: #e0dfd8;
        --gray-mid: #9a9a90;
        --gray-dark: #2a2a2a;
        --orange: #ff5500;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--black);
        color: var(--white);
        font-family: "DM Sans", sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }
      nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 16px 5vw;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(10, 10, 10, 0.9);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      .nav-logo {
        font-family: "Bebas Neue", sans-serif;
        font-size: 22px;
        color: var(--white);
        letter-spacing: 0.08em;
        text-decoration: none;
      }
      .nav-back {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.2em;
        color: var(--gray-mid);
        text-decoration: none;
        text-transform: uppercase;
        transition: color 0.2s;
      }
      .nav-back:hover {
        color: var(--white);
      }
      .bg-text {
        position: fixed;
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(100px, 20vw, 360px);
        color: rgba(255, 255, 255, 0.02);
        user-select: none;
        white-space: nowrap;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 0;
      }
      .main-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 100px 20px 60px;
        position: relative;
        z-index: 1;
      }
      .card {
        background: var(--gray-dark);
        width: 100%;
        max-width: 560px;
        padding: 48px 40px;
        position: relative;
        z-index: 2;
        animation: fadeUp 0.5s ease both;
      }
      @media (max-width: 500px) {
        .card {
          padding: 32px 24px;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(24px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .card-eyebrow {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.35em;
        color: var(--orange);
        text-transform: uppercase;
        margin-bottom: 12px;
      }
      .card-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: clamp(40px, 8vw, 72px);
        line-height: 0.9;
        margin-bottom: 8px;
        color: var(--white);
      }
      .card-title span {
        color: transparent;
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
      }
      .card-desc {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        color: var(--gray-mid);
        letter-spacing: 0.1em;
        line-height: 1.7;
        margin-bottom: 32px;
      }
      .field-label {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        letter-spacing: 0.3em;
        color: var(--gray-mid);
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
      }
      .notif-input {
        width: 100%;
        padding: 14px 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: var(--white);
        font-family: "DM Sans", sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 6px;
      }
      .notif-input:focus {
        border-color: rgba(255, 255, 255, 0.35);
      }
      .notif-input::placeholder {
        color: var(--gray-mid);
      }
      textarea.notif-input {
        resize: vertical;
        min-height: 100px;
      }
      .char-count {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        color: var(--gray-mid);
        text-align: right;
        margin-bottom: 20px;
      }
      .send-btn {
        width: 100%;
        padding: 16px;
        background: var(--white);
        color: var(--black);
        border: none;
        cursor: pointer;
        font-family: "Space Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        transition: opacity 0.2s;
      }
      .send-btn:hover {
        opacity: 0.85;
      }
      .send-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      .divider-line {
        height: 1px;
        background: rgba(255, 255, 255, 0.08);
        margin: 28px 0;
      }
      .history-title {
        font-family: "Bebas Neue", sans-serif;
        font-size: 22px;
        color: var(--white);
        margin-bottom: 14px;
      }
      .history-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 280px;
        overflow-y: auto;
      }
      .history-list::-webkit-scrollbar {
        width: 3px;
      }
      .history-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
      }
      .history-item {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 14px 16px;
        animation: fadeUp 0.3s ease both;
      }
      .history-item-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 4px;
      }
      .history-item-body {
        font-size: 12px;
        color: var(--gray-mid);
        line-height: 1.5;
        margin-bottom: 6px;
      }
      .history-item-meta {
        font-family: "Space Mono", monospace;
        font-size: 9px;
        color: rgba(255, 255, 255, 0.2);
        letter-spacing: 0.1em;
      }
      .history-empty {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        color: var(--gray-mid);
        letter-spacing: 0.15em;
        padding: 20px 0;
        text-align: center;
      }
      .state-wrap {
        text-align: center;
        padding: 40px 0;
      }
      .state-label {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        color: var(--gray-mid);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 16px;
        display: block;
      }
      .state-wrap h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 40px;
        color: var(--white);
        margin-bottom: 10px;
      }
      .state-wrap p {
        font-family: "Space Mono", monospace;
        font-size: 10px;
        color: var(--gray-mid);
        letter-spacing: 0.12em;
        line-height: 1.7;
        margin-bottom: 24px;
      }
      .back-link {
        display: inline-block;
        padding: 12px 28px;
        background: var(--white);
        color: var(--black);
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-decoration: none;
        text-transform: uppercase;
        transition: opacity 0.2s;
      }
      .back-link:hover {
        opacity: 0.8;
      }
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--white);
        color: var(--black);
        padding: 12px 24px;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        letter-spacing: 0.15em;
        z-index: 9999;
        opacity: 0;
        transition: all 0.3s;
        white-space: nowrap;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      .loading-text {
        text-align: center;
        font-family: "Space Mono", monospace;
        font-size: 10px;
        color: var(--gray-mid);
        letter-spacing: 0.2em;
        padding: 20px 0;
      }
    </style>
  </head>
  <body>
    <div class="bg-text">NOTIF</div>
    <div class="toast" id="toast"></div>

    <nav>
      <a class="nav-logo" href="index.html">MINSOULZ</a>
      <a class="nav-back" href="index.html">Kembali</a>
    </nav>

    <div class="main-wrap">
      <div class="card" id="mainCard">
        <div class="loading-text">Memuat...</div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getDatabase,
        ref,
        push,
        onValue,
        set,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
      import {
        getMessaging,
        getToken,
        onMessage,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

      const ADMINS = ["DAVIN", "VINCENT", "VELLICIA"];
      const API_URL = "/api/send-notification";
      const VAPID_KEY =
        "BFKQFF44IB3i-I1Y9rOe84XiRhGLNcOuzhD9JWjjri7mJ7ecrxRJ_0k2UiqZ7HPyNsv6p-HV8za6lYnZoOAhaHM";

      const firebaseConfig = {
        apiKey: "AIzaSyCsfOGvVR7FtihQ51Iqaw1h5iJf0WFkU3Y",
        authDomain: "bbq-minsoulz.firebaseapp.com",
        databaseURL:
          "https://bbq-minsoulz-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "bbq-minsoulz",
        storageBucket: "bbq-minsoulz.firebasestorage.app",
        messagingSenderId: "788013415717",
        appId: "1:788013415717:web:21cf137065741bbe95aecc",
      };

      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);
      const messaging = getMessaging(app);

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }

      async function setupFCM() {
        const username = localStorage.getItem("bbq_username") || "";
        if (!username) return;
        if (!("serviceWorker" in navigator)) return;
        try {
          const sw = await navigator.serviceWorker.register(
            "/firebase-messaging-sw.js"
          );
          if (Notification.permission !== "granted") {
            const perm = await Notification.requestPermission();
            if (perm !== "granted") return;
          }
          const token = await getToken(messaging, {
            vapidKey: VAPID_KEY,
            serviceWorkerRegistration: sw,
          });
          if (token) {
            await set(ref(db, "fcm_tokens/" + username), {
              token,
              ts: Date.now(),
            });
          }
        } catch (e) {
          console.error("FCM setup error:", e);
        }
      }

      onMessage(messaging, (payload) => {
        if (!payload.notification) return;
        showToast(
          payload.notification.title + ": " + payload.notification.body
        );
      });

      setupFCM();

      const username = localStorage.getItem("bbq_username") || "";
      const card = document.getElementById("mainCard");

      if (!username) {
        card.innerHTML = `
          <div class="state-wrap">
            <span class="state-label">Akses Ditolak</span>
            <h2>Login Dulu</h2>
            <p>Kamu belum login.<br>Kembali ke halaman utama dan login terlebih dahulu.</p>
            <a class="back-link" href="index.html">Ke Halaman Utama</a>
          </div>`;
      } else if (!ADMINS.includes(username)) {
        card.innerHTML = `
          <div class="state-wrap">
            <span class="state-label">Akses Ditolak</span>
            <h2>Bukan Admin</h2>
            <p>Halaman ini hanya untuk admin.<br>Kamu tidak memiliki akses, ${username}.</p>
            <a class="back-link" href="index.html">Kembali</a>
          </div>`;
      } else {
        card.innerHTML = `
          <div class="card-eyebrow">Admin Panel — ${username}</div>
          <div class="card-title">KIRIM<br><span>NOTIF</span></div>
          <p class="card-desc">
            Notifikasi dikirim ke semua member yang sudah<br>
            mengizinkan notifikasi di browser mereka.
          </p>
          <label class="field-label" for="notifTitle">Judul Notifikasi</label>
          <input
            class="notif-input"
            id="notifTitle"
            type="text"
            placeholder="Contoh: Jam maju jadi 15.00!"
            maxlength="60"
            autocomplete="off"
          />
          <div class="char-count"><span id="titleCount">0</span> / 60</div>
          <label class="field-label" for="notifBody">Isi Pesan</label>
          <textarea
            class="notif-input"
            id="notifBody"
            placeholder="Contoh: Yuk langsung kumpul, jangan telat ya!"
            maxlength="200"
          ></textarea>
          <div class="char-count"><span id="bodyCount">0</span> / 200</div>
          <button class="send-btn" id="sendBtn">Kirim Pengumuman</button>
          <div class="divider-line"></div>
          <div class="history-title">Riwayat Pengumuman</div>
          <div class="history-list" id="historyList">
            <div class="history-empty">Belum ada pengumuman dikirim.</div>
          </div>
        `;

        const titleEl = document.getElementById("notifTitle");
        const bodyEl = document.getElementById("notifBody");

        titleEl.addEventListener("input", () => {
          document.getElementById("titleCount").textContent =
            titleEl.value.length;
        });
        bodyEl.addEventListener("input", () => {
          document.getElementById("bodyCount").textContent =
            bodyEl.value.length;
        });

        document
          .getElementById("sendBtn")
          .addEventListener("click", async () => {
            const title = titleEl.value.trim();
            const body = bodyEl.value.trim();

            if (!title) {
              showToast("Judul tidak boleh kosong!");
              titleEl.focus();
              return;
            }
            if (!body) {
              showToast("Isi pesan tidak boleh kosong!");
              bodyEl.focus();
              return;
            }

            const btn = document.getElementById("sendBtn");
            btn.disabled = true;
            btn.textContent = "Mengirim...";

            try {
              const res = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ title, body, senderName: username }),
              });
              const data = await res.json();

              if (data.success) {
                await push(ref(db, "notif_history"), {
                  title,
                  body,
                  by: username,
                  ts: Date.now(),
                });
                showToast("Notifikasi berhasil dikirim!");
                titleEl.value = "";
                bodyEl.value = "";
                document.getElementById("titleCount").textContent = "0";
                document.getElementById("bodyCount").textContent = "0";
              } else {
                showToast("Gagal: " + (data.error || "unknown error"));
              }
            } catch (e) {
              showToast("Error: " + e.message);
            }

            btn.disabled = false;
            btn.textContent = "Kirim Pengumuman";
          });

        onValue(ref(db, "notif_history"), (snap) => {
          const data = snap.val();
          const list = document.getElementById("historyList");

          if (!data) {
            list.innerHTML =
              '<div class="history-empty">Belum ada pengumuman dikirim.</div>';
            return;
          }

          const items = Object.values(data).sort((a, b) => b.ts - a.ts);
          list.innerHTML = items
            .map(
              (item) => `
            <div class="history-item">
              <div class="history-item-title">${item.title}</div>
              <div class="history-item-body">${item.body}</div>
              <div class="history-item-meta">
                Dikirim oleh ${item.by} &nbsp;&middot;&nbsp;
                ${new Date(item.ts).toLocaleString("id-ID")}
              </div>
            </div>
          `
            )
            .join("");
        });
      }
    </script>
  </body>
</html>
